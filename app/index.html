<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPER RADAR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #0B0E13; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
      * { box-sizing: border-box; }
      button, input, select { min-height: 42px; }
      button, a { -webkit-tap-highlight-color: transparent; }
      button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
        outline: 2px solid #F5A623; outline-offset: 2px;
      }
      select { max-width: 100%; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
      @media (max-width: 760px) {
        button, input, select { min-height: 44px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
